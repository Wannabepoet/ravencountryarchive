<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DIARY</title>

<style>
/* ====== BASE ====== */
body {
  margin: 0;
  font-family: "Courier New", monospace;
  background: #0b0b0b;
  color: #d6d6d6;
  display: flex;
  height: 100vh;
}

/* ====== SIDEBAR ====== */
.sidebar {
  width: 280px;
  background: #111;
  border-right: 2px solid #2a1c1c;
  padding: 10px;
  overflow-y: auto;
}

.entry-item {
  padding: 10px;
  margin-bottom: 8px;
  background: #151515;
  border: 1px solid #2a1c1c;
  cursor: pointer;
}

.entry-item:hover {
  background: #1c1c1c;
}

/* ====== MAIN PAGE ====== */
.main {
  flex: 1;
  position: relative;
  padding: 20px;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,0,0.05), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.4), transparent 50%),
    #0e0e0e;
}

/* “stained paper” effect */
.paper {
  background:
    linear-gradient(to bottom, rgba(255,255,255,0.05), transparent),
    url("https://www.transparenttextures.com/patterns/old-wall.png");
  background-color: #1a1616;
  border: 1px solid #3a2424;
  height: 70%;
  padding: 20px;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 80%;
  background: transparent;
  border: none;
  outline: none;
  color: #e6e6e6;
  font-size: 16px;
  resize: none;
}

/* BUTTONS */
button {
  background: #2a1c1c;
  border: 1px solid #3a2424;
  color: #ddd;
  padding: 10px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #3a2424;
}

/* ====== ROACH (subtle horror detail) ====== */
.roach {
  position: absolute;
  width: 10px;
  height: 6px;
  background: #2b1d1d;
  border-radius: 40%;
  bottom: 10%;
  left: -20px;
  animation: crawl 18s infinite linear;
  opacity: 0.7;
}

@keyframes crawl {
  0% { left: -20px; transform: rotate(0deg); }
  50% { transform: rotate(15deg); }
  100% { left: 110%; transform: rotate(-10deg); }
}

/* subtle rust flicker */
@keyframes flicker {
  0%,100% { opacity: 1; }
  50% { opacity: 0.96; }
}

.paper {
  animation: flicker 6s infinite;
}
</style>
</head>

<body>

<div class="sidebar" id="list">
  <h3>DIARY</h3>
  <button onclick="newEntry()">+ new entry</button>
</div>

<div class="main">
  <div class="paper">
    <textarea id="text" placeholder="write..."></textarea>
    <br>
    <button onclick="saveEntry()">save</button>
  </div>

  <div class="roach"></div>
</div>

<script>
let currentId = null;

function loadEntries() {
  const list = document.getElementById("list");
  const entries = JSON.parse(localStorage.getItem("entries") || "[]");

  list.querySelectorAll(".entry-item").forEach(e => e.remove());

  entries.forEach(e => {
    const div = document.createElement("div");
    div.className = "entry-item";
    div.innerText = e.text.slice(0, 40) || "empty entry";
    div.onclick = () => openEntry(e.id);
    list.appendChild(div);
  });
}

function saveEntry() {
  const text = document.getElementById("text").value;
  let entries = JSON.parse(localStorage.getItem("entries") || "[]");

  if (currentId) {
    entries = entries.map(e =>
      e.id === currentId ? { ...e, text } : e
    );
  } else {
    entries.push({ id: Date.now(), text });
  }

  localStorage.setItem("entries", JSON.stringify(entries));
  loadEntries();
  currentId = null;
}

function openEntry(id) {
  const entries = JSON.parse(localStorage.getItem("entries") || "[]");
  const entry = entries.find(e => e.id === id);

  if (entry) {
    document.getElementById("text").value = entry.text;
    currentId = id;
  }
}

function newEntry() {
  document.getElementById("text").value = "";
  currentId = null;
}

loadEntries();
</script>

</body>
</html>
